```yaml
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
        node-version: [20]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest pytest-cov

    - name: Run FastAPI tests
      working-directory: ./backend
      run: |
        pytest --cov=app --cov-report=xml

    - name: Install Node.js dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Run Next.js tests
      working-directory: ./frontend
      run: npm test

  security:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Trivy container scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'backend/Dockerfile'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Snyk security scan
      uses: snyk/actions/python@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        command: test
        args: --all-projects --severity-threshold=high

    - name: OWASP ZAP baseline scan
      uses: zaproxy/action-baseline@v0.10.0
      with:
        target: 'http://localhost:8000'
        rules_file_name: '.zap/rules.tsv'
        cmd_options: '-config api.disablekey=true'

  migrations:
    needs: security
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      working-directory: ./backend
      run: |
        pip install -r requirements.txt
        pip install alembic

    - name: Run Alembic migrations
      working-directory: ./backend
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        alembic upgrade head

  generate_docs:
    needs: migrations
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      working-directory: ./backend
      run: pip install -r requirements.txt

    - name: Generate OpenAPI docs
      working-directory: ./backend
      run: |
        python -c "from app.main import app; import json; open('openapi.json', 'w').write(json.dumps(app.openapi()))"

    - name: Commit docs
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add backend/openapi.json
        git commit -m "Update OpenAPI docs" || echo "No changes to commit"
        git push

  deploy:
    needs: generate_docs
    runs-on: ubuntu-latest

    steps:
    - name: Deploy backend to Railway
      if: github.ref == 'refs/heads/main'
      uses: railwayapp/action@v1
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        RAILWAY_ENVIRONMENT: production
      with:
        service: backend
        command: up --detach

    - name: Deploy frontend to Vercel
      if: github.ref == 'refs/heads/main'
      uses: amondnet/vercel-action@v30
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: frontend
        vercel-args: '--prod'
```